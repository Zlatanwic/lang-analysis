name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Generate dashboard data
        run: python main.py --json-output frontend/public/dashboard-data.json

      - name: Debug generated data bundle
        run: |
          echo "Repository: $GITHUB_REPOSITORY"
          echo "Working directory: $(pwd)"
          echo "--- frontend/public ---"
          ls -la frontend/public
          echo "--- dashboard-data.json head ---"
          head -n 20 frontend/public/dashboard-data.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Type-check frontend
        working-directory: frontend
        run: pnpm run check

      - name: Build frontend
        working-directory: frontend
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: pnpm run build

      - name: Copy generated dashboard data into Pages artifact
        run: cp frontend/public/dashboard-data.json frontend/dist/dashboard-data.json

      - name: Debug built artifact
        run: |
          echo "--- frontend/dist ---"
          ls -la frontend/dist
          echo "--- frontend/dist file tree ---"
          find frontend/dist -maxdepth 3 -type f | sort
          echo "--- index.html references ---"
          grep -n "dashboard-data.json\|assets/" frontend/dist/index.html || true
          echo "--- copied dashboard-data.json head ---"
          head -n 20 frontend/dist/dashboard-data.json

      - name: Verify generated Pages artifact
        run: |
          test -f frontend/public/dashboard-data.json
          test -f frontend/dist/dashboard-data.json
          test -f frontend/dist/index.html

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
